bases: [
  "configs/base.yaml",
]

binarizer:
  data_dir: "data/notes"

model:
  mode: d3pm
  use_languages: true
  num_languages: 127
  embedding_dim: 256
  region_cycle_len: 3
  segmenter:
    cls: "modules.backbones.EBF.EBFBackbone"
    kwargs:
      dim: 256
      num_layers: 8
      latent_layer_idx: 6
      latent_out_dim: 16
      num_heads: 8
      head_dim: 64
      c_kernel_size: 31
      m_kernel_size: 31
      ffn_type: 'glu' # 'glu', 'ffn', 'cgmlp'
      ffn_latent_drop: 0.0
      ffn_out_drop: 0.1
      use_ls: true
      dropout_attn: 0.0
      out_drop: 0.1
      c_out_drop: 0.1
      c_latent_drop: 0.0

training:
  loss:
    region_loss:
      neighborhood_size: 5
      exponential_decay: true
    boundary_loss:
      radius: 20
      decay_start: 20
      decay_width: 20
      decay_alpha: 0.5
      decay_power: 2.0
  validation:
    d3pm_sample_steps: 5
    boundary_decoding_threshold: 0.3
    boundary_decoding_radius: 2
    boundary_matching_tolerance: 5

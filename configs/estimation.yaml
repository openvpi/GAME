bases: [
  "configs/base.yaml",
]

binarizer:
  data_dir: "data/notes"

model:
  embedding_dim: 256
  region_cycle_len: 3
  midi_min: 0
  midi_max: 127
  midi_num_bins: 256
  use_glu: true

  adaptor:
    cls: "modules.backbones.EBF.EBFBackbone"
    kwargs:
      dim: 256
      num_layers: 4
      latent_layer_idx: 2
      latent_out_dim: 16
      use_out_norm: false
      num_heads: 8
      head_dim: 64
      c_kernel_size: 31
      m_kernel_size: 31
      ffn_type: 'glu' # 'glu', 'ffn', 'cgmlp' #对了这里换成cgmlp看看效果
      ffn_latent_drop: 0.0
      ffn_out_drop: 0.1
      use_ls: true
      dropout_attn: 0.0
      out_drop: 0.1
      c_out_drop: 0.1
      c_latent_drop: 0.0
  estimator:
    cls: "modules.backbones.EBF.EBFBackbone"
    kwargs:
      dim: 256
      num_layers: 4
      num_heads: 8
      head_dim: 64
      c_kernel_size: 7
      m_kernel_size: 3
      ffn_type: 'glu' # 'glu', 'ffn', 'cgmlp'
      ffn_latent_drop: 0.0
      ffn_out_drop: 0.1
      use_ls: true
      dropout_attn: 0.0
      out_drop: 0.1
      c_out_drop: 0.1
      c_latent_drop: 0.0

training:
  loss:
    region_loss:
      neighborhood_size: 5
      exponential_decay: true
    note_loss:
      deviation: 1.0
